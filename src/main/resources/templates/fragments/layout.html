<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<!-- ===== LAYOUT ===== -->
<head th:fragment="head(title)">
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' - CBT 평가시스템'">CBT 평가시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; border-radius: 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #3d5166; color: #fff; }
        .sidebar .nav-link i { margin-right: 8px; width: 20px; }
        .sidebar-brand { padding: 20px; color: #fff; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #3d5166; }
        .main-content { padding: 30px; }
        .page-header { border-bottom: 2px solid #dee2e6; padding-bottom: 15px; margin-bottom: 25px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-header { background: #fff; border-bottom: 2px solid #f0f0f0; font-weight: 600; }
        .btn-action { margin: 0 2px; }
        .badge-type { font-size: 0.75rem; }
        .question-card { border-left: 4px solid #3498db; margin-bottom: 20px; }
        .question-card.short_answer { border-left-color: #e67e22; }
        .question-card.essay { border-left-color: #9b59b6; }
        .answer-input { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-top: 10px; }
        .result-correct { background: #d4edda; }
        .result-wrong { background: #f8d7da; }
        .result-pending { background: #fff3cd; }
        footer { background: #fff; border-top: 1px solid #dee2e6; padding: 15px 0; margin-top: 40px; }
    </style>
</head>

<!-- 사이드바 -->
<!--fragment="이름(변수명,....)" -->
<nav th:fragment="sidebar(active)" class="col-md-2 sidebar d-flex flex-column">
    <div class="sidebar-brand">
        <i class="bi bi-mortarboard-fill"></i> CBT 평가시스템
    </div>
    <ul class="nav flex-column mt-2">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'home'} ? 'active'" th:href="@{/}">
                <i class="bi bi-house"></i> 홈
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'subject'} ? 'active'" th:href="@{/subjects}">
                <i class="bi bi-journal-bookmark"></i> 과목관리
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'question'} ? 'active'" th:href="@{/questions}">
                <i class="bi bi-question-circle"></i> 문제관리
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'exam'} ? 'active'" th:href="@{/exam}">
                <i class="bi bi-pencil-square"></i> 평가진행
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'result'} ? 'active'" th:href="@{/result}">
                <i class="bi bi-bar-chart-line"></i> 평가결과
            </a>
        </li>
    </ul>
    <div class="mt-auto p-3 text-secondary" style="font-size:0.8rem;">
        &copy; 2025 CBT System
    </div>
</nav>

<!-- 공통 스크립트 -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</html>
